name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (repo-wide, all workspaces)
        run: bunx tsc --noEmit

      - name: Test (CLI + all workspaces)
        run: bun test

      - name: Build CLI
        run: bun run build

  # DB-backed integration tests against an ephemeral Postgres service container
  # (no mocks — parity with prod migrations, SPEC §6.1). Applies the real
  # migrations and exercises RLS tenant isolation, the capability-token store
  # (mint/verify/revoke against the real `tokens` table), the bot-orchestrator,
  # the magic-link Postgres user store, the tenancy gate (adversarial
  # isolation + revoke-without-cache, §6.2 #4), and the /calls route (create →
  # PENDING + RLS-scoped reads, §5.2/§5.6); tears down with the job.
  postgres-smoke:
    name: Postgres integration tests (migrations + RLS + tokens + orchestrator + magic-link + auth gate + calls)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: samograph
          POSTGRES_PASSWORD: samograph
          POSTGRES_DB: samograph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U samograph"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://samograph:samograph@localhost:5432/samograph_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: DB integration tests (full suite under Postgres — DB-gated tests auto-run via DATABASE_URL; no per-PR path edits)
        # Run the WHOLE suite with DATABASE_URL set so every DB-gated test executes
        # (each skips cleanly when DATABASE_URL is unset, e.g. in the Test-and-build job).
        # Avoids the hand-maintained path list that caused serial ci.yml merge
        # conflicts on every backend PR in Sprint 1 (#65). New DB tests need NO ci.yml edit.
        run: bun test

  # Label-gated single-tenant benchmark runner for the WS publisher-latency SLO
  # (SPEC §6.2 #3). The assertion only runs on a runner with single-tenant
  # isolation; on shared CI it SKIPS LOUDLY rather than asserting, to prevent
  # silent flake (SPEC §6.2 #3 / §10 #12). The benchmark itself lands with
  # apps/ws-hub; this is the foundation stub of the job + its skip behavior.
  benchmark-runner:
    name: WS publisher-latency benchmark (single-tenant runner)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run benchmark on isolated runner, else SKIP LOUDLY
        env:
          BENCH_RUNNER_LABEL: ${{ vars.BENCH_RUNNER_LABEL }}
        run: |
          if [ "${BENCH_RUNNER_LABEL:-}" = "samograph-bench-isolated" ]; then
            echo "::notice title=benchmark-runner::Dedicated single-tenant runner present — running WS publisher-latency p99<=5ms SLO (SPEC §6.2 #3)."
            echo "Benchmark implementation lands with apps/ws-hub; foundation stub asserts the job wiring only."
          else
            echo "::warning title=benchmark-runner SKIPPED::No single-tenant isolated runner (label 'samograph-bench-isolated' absent). Per SPEC §6.2 #3 / §10 #12 the WS publisher-latency p99<=5ms SLO is SKIPPED LOUDLY on shared CI rather than asserted, to prevent silent flake."
            echo "SKIPPED: benchmark-runner requires the dedicated single-tenant runner; not asserting on shared CI. Set the repo variable BENCH_RUNNER_LABEL=samograph-bench-isolated on the isolated runner to enable."
          fi
