# samohost app manifest for samograph.dev — schema: NikolayS/samohost src/manifest/toml.ts.
#
# NOTE: this file is INERT until an operator runs, ON THE CONTROL PLANE:
#   samohost app register samograph --from-toml .samohost.toml --force
# That is the one command that flips deploys to the 3-tier model:
#   vYYYYMMDD.N tag -> production   (samograph.samo.team)
#   merge to main   -> main preview  (samograph-main.samo.cat)
#   dev-branch push -> branch preview (samograph-<branch>.samo.cat), each a DBLab clone
# (Requires the samohost release-tag feature — NikolayS/samohost#132 / PR #133.)
#
# NO secrets belong here (public repo). DB URLs + tokens stay in envFile on the host,
# which samohost never reads or writes.
#
# CADDY-ADAPT PROOF (NikolayS/samograph PR #xxx):
#   renderVhost(planFromApp(this spec)) caddy-adapt-EQUALS
#   test/fixtures/samograph-main-vhost.caddy (sha256 fce6b0f1...)
#   Proved on caddy v2.11.4 via proof-samograph-toml.ts in samohost worktree.

name              = "samograph"
repo              = "NikolayS/samograph"
branch            = "main"                       # drives the MAIN PREVIEW, NOT prod
appDir            = "/opt/samograph/app"
buildCmd          = "bun install --frozen-lockfile && cd apps/web && APP_API_ORIGIN=http://127.0.0.1:${APP_API_PORT} bun run build"
migrateCmd        = "bun packages/shared/db/migrate.ts"
healthUrl         = "http://127.0.0.1:8887/health"   # app-api prod port; returns 200 "ok"
serviceUnit       = "samograph-web"                  # legacy synthesis source (kept for back-compat)
mainHost          = "samograph.samo.team"            # PROD public host
mainListen        = "cp-http80"                      # control-plane HTTP:80 (TLS terminated upstream by CF)
releaseTagPattern = "v[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9]*" # vYYYYMMDD.N only; CI enforces the exact numeric shape
releaseTagFormat  = "date"                           # valid-calendar vYYYYMMDD.N, N >= 1
releaseCiWorkflow = ".github/workflows/ci.yml"       # only this exact workflow may green-light the release SHA
envFile           = "/opt/samograph/app/.env"        # SAMO_ENV=prod + real secrets (samohost never touches it)
envDbVars         = ["DATABASE_URL"]                 # rewritten to the DBLab clone in previews (never touches prod DB)
previewDbBackend  = "dblab"                          # previews = DBLab thin clones (owner non-negotiable)
dbBackend         = "none"                           # prod DB is durable (samograph_prod), not samohost-cloned
rlsUrlVar         = "DATABASE_URL"                   # doctor probes the runtime identity, never a separate admin URL
rlsNonSuperuser   = true                              # production/preview runtime DB role must not be superuser/BYPASSRLS

# Preview env files copy only the clone-rewritten DB URL. All signing secrets
# are generated per preview below; production integrations and operator creds
# are explicitly absent even if they exist in the production template.
previewEnvAllowlist = ["DATABASE_URL"]
previewEnvUnset = [
  "HOST", "WEB_ORIGIN",
  "RECALL_LIVE", "RECALL_AI", "RECALL_API_KEY", "PUBLIC_WEBHOOK_BASE",
  "RESEND_API_KEY", "MAGIC_LINK_FROM",
  "GOOGLE_APPLICATION_CREDENTIALS", "GOOGLE_DOC_ID",
  "SAMOGRAPH_PUBLIC_BASE",
  "SAMOGRAPH_FRAME_TOKEN", "SAMOGRAPH_PRESENCE_TOKEN",
  "SAMOGRAPH_PRESENCE_WRITE_TOKEN", "SAMOGRAPH_WEBHOOK_TOKEN",
]

# PR-B: auto-generate these signing secrets per preview env (stored in 0600 secrets.env as EnvironmentFile).
# Exact names verified against packages/shared/config/env.ts APP_API_SIGNING_SECRETS +
# WS_HUB_SIGNING_SECRETS: app-api needs all three; ws-hub needs SESSION + TOKEN only.
secrets           = ["SESSION_SECRET", "TOKEN_SECRET", "MAGIC_LINK_SECRET", "RECALL_WEBHOOK_SECRET"]

# PR-C: env-create rewrites this var in each preview's secrets.env to the DBLab clone URL.
databaseUrlEnv    = "DATABASE_URL"

# Multi-service routing topology.
# defaultListener = the catch-all reverse_proxy target (web:3000).
defaultListener   = "web"

# ---- service: web (samograph-web unit) ----
# Runs two processes under start-prod.sh:
#   node apps/web (Next.js)        PORT        = 3000
#   bun  apps/app-api/server.ts    APP_API_PORT = 8887
# Confirmed live: ss -tlnp shows :3000 (node) and :8887 (bun) under the same cgroup.

[[services]]
name      = "web"
unit      = "samograph-web"
# PROD ExecStart confirmed READ-ONLY from VM (116.203.249.135, 2026-07-10):
# The launcher is part of the checked-out release SHA. /usr/bin/bash is absolute
# for systemd; scripts/start-hosted-web.sh resolves under WorkingDirectory, which
# samohost sets to appDir in prod and the isolated checkout in previews.
execStart = "/usr/bin/bash scripts/start-hosted-web.sh"

  [[services.listeners]]
  name       = "web"
  port       = 3000
  portEnv    = "PORT"
  healthPath = "/"

  [[services.listeners]]
  name       = "app-api"
  port       = 8887
  portEnv    = "APP_API_PORT"
  healthPath = "/health"

# ---- service: live (samograph-live unit) ----
# Single bun process (apps/ws-hub/dev-live-server.ts) binding two hosted ports:
#   ws-hub   WS_HUB_PORT  = 8888   WebSocket hub for real-time call streams
#   ingest   INGEST_PORT  = 8189   Recall webhook ingest endpoint
# The dev-control listener exists only under explicit SAMO_ENV=dev and is never
# part of a production or preview service manifest.
# Confirmed live: ss -tlnp shows :8888 and :8189 (bun pid 1552, samograph-live cgroup).

[[services]]
name      = "live"
unit      = "samograph-live"
# PROD ExecStart confirmed READ-ONLY from VM (116.203.249.135, 2026-07-10):
#   systemctl cat samograph-live → ExecStart=/usr/local/bin/bun apps/ws-hub/dev-live-server.ts
# (dev-live-server.ts combines ingest + ws-hub in one process with assertNoDevDefaultSecrets guard;
#  it is the prod entrypoint for the live unit despite the "dev" prefix in the filename.)
execStart = "/usr/local/bin/bun apps/ws-hub/dev-live-server.ts"

  [[services.listeners]]
  name       = "ws-hub"
  port       = 8888
  portEnv    = "WS_HUB_PORT"
  healthPath = "/health"

  [[services.listeners]]
  name       = "ingest"
  port       = 8189
  portEnv    = "INGEST_PORT"
  healthPath = "/health"

# ---- routes (Caddy first-match order; matches prod /etc/caddy/sites.d/00-main-samograph.caddy) ----

[[routes]]
name        = "stream"
matchRegexp = "^/calls/[^/]+/stream$"
to          = "ws-hub"

[[routes]]
matchPath   = "/webhook*"
to          = "ingest"

[[routes]]
name        = "transcript"
matchRegexp = "^/calls/[^/]+/transcript"
to          = "ws-hub"

[[routes]]
matchPath   = "/__dev*"
[routes.respond]
status = 404
body   = "not found"
